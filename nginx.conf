server {
    listen 80;
    root /usr/share/nginx/html;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml font/ttf font/woff2;
    gzip_min_length 1024;

    # ── Root → Landing page ───────────────────────────────────────────
    location = / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files /landing.html =404;
    }

    # ── Static assets — hashed filenames, long cache ──────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── LMS SPA — all other paths fall back to index.html ────────────
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri /index.html;
    }
}
