server {
    listen 80;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml font/ttf font/woff2;
    gzip_min_length 1024;

    # ── Root → Landing page ───────────────────────────────────────────
    location = / {
        root /usr/share/nginx/html/landing;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files /index.html =404;
    }

    # ── Landing static assets (hashed, long cache) ────────────────────
    location /landing/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── LMS static assets (hashed, long cache) ────────────────────────
    location /lms/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── LMS SPA — all other paths fall back to lms/index.html ─────────
    location / {
        root /usr/share/nginx/html/lms;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri /index.html;
    }
}
